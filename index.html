<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile + Performance -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>noHazz</title>

    <meta name="description" content="NOHAZZ is a next-generation textile science detergent engineered in Sri Lanka for skin-safe, eco-friendly, and high-performance cleaning." />

    <meta name="keywords" content="NOHAZZ, detergent Sri Lanka, eco detergent, textile science, green cleaning, skin safe detergent, biodegradable detergent" />

    <meta name="author" content="NOHAZZ" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://nohazz.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/panther-logo.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#050B0A" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NOHAZZ | Textile Science Eco Detergent" />
    <meta property="og:description" content="Eco-friendly, skin-safe, high-performance detergent engineered with textile science." />
    <meta property="og:image" content="https://nohazz.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://nohazz.com" />
    <meta property="og:site_name" content="NOHAZZ" />
    <meta property="og:locale" content="en_LK" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NOHAZZ | Textile Science Detergent" />
    <meta name="twitter:description" content="Eco-friendly detergent powered by textile science innovation." />
    <meta name="twitter:image" content="https://nohazz.com/og-image.jpg" />

    <!-- Preconnect (speed boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (Product + Brand enhanced) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "NOHAZZ Textile Science Detergent",
      "description": "Eco-friendly, skin-safe, high-performance detergent engineered with textile science.",
      "brand": {
        "@type": "Brand",
        "name": "NOHAZZ"
      },
      "image": "https://nohazz.com/og-image.jpg",
      "url": "https://nohazz.com",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "LKR",
        "availability": "https://schema.org/InStock",
        "url": "https://nohazz.com"
      }
    }
    </script>

    <!-- Organization Schema (IMPORTANT for ranking trust) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "noHazz",
      "url": "https://nohazz.com",
      "logo": "https://nohazz.com/panther-logo.png"
    }
    </script>

    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,si",
          },
          "google_translate_element"
        );
      }
    </script>

    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
